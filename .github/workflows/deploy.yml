name: Build & Publish

# Runs the automated tests, then builds and publishes the Docker images to GHCR.
# The pipeline ENDS at publishing the images — there is no automatic server deploy.
# Image versioning:
#   - push to main            -> tags: latest, <commit-sha>
#   - push a tag `vX.Y.Z`     -> tags: latest, <commit-sha>, <X.Y.Z>
on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    name: Automated tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund
      - name: Run tests
        working-directory: backend
        run: npm test

  build-and-push:
    name: Build & publish images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          PREFIX="${REGISTRY}/$(echo "${IMAGE_PREFIX}" | tr '[:upper:]' '[:lower:]')"
          # Build the tag list for an image: always latest + commit SHA, plus the
          # release version (X.Y.Z) when this run was triggered by a `vX.Y.Z` tag.
          build_tags () {
            local img="$1"
            echo "${PREFIX}-${img}:latest"
            echo "${PREFIX}-${img}:${GITHUB_SHA}"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "${PREFIX}-${img}:${GITHUB_REF_NAME#v}"
            fi
          }
          {
            echo "backend_tags<<EOF";  build_tags backend;  echo "EOF"
            echo "frontend_tags<<EOF"; build_tags frontend; echo "EOF"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "version=${GITHUB_REF_NAME#v}"
            else
              echo "version=(none)"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.frontend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Images published"
            echo ""
            echo "Release version: \`${{ steps.meta.outputs.version }}\`"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.backend_tags }}"
            echo "${{ steps.meta.outputs.frontend_tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
