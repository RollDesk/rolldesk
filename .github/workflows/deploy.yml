name: CI/CD

# Build and push Docker images to GitHub Container Registry (GHCR),
# then deploy them to a remote server over SSH.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Lowercased "owner/repo"; used as the image name prefix on GHCR.
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund
      - name: Run tests
        working-directory: backend
        run: npm test

  build-and-push:
    name: Build and push images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      prefix: ${{ steps.meta.outputs.prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image prefix
        id: meta
        run: echo "prefix=${REGISTRY}/$(echo "${IMAGE_PREFIX}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}-backend:latest
            ${{ steps.meta.outputs.prefix }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}-frontend:latest
            ${{ steps.meta.outputs.prefix }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    # Configure a GitHub Environment named "production" for extra protection (optional).
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to the server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0
          overwrite: true

      - name: Pull images and (re)start the stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_PREFIX,TAG,REGISTRY,REGISTRY_USER,REGISTRY_TOKEN
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            # Use the production compose file (database migrations run inside the
            # backend container on startup, so nothing extra needs to be copied).
            mv -f docker-compose.prod.yml docker-compose.yml

            # Authenticate to the registry to pull private images.
            echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

            # Image names on GHCR must be lowercase.
            IMAGE_PREFIX="$(echo "$IMAGE_PREFIX" | tr '[:upper:]' '[:lower:]')"

            # Image coordinates for this release (override values in the server .env).
            export IMAGE_PREFIX TAG
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_PREFIX: ${{ env.REGISTRY }}/${{ github.repository }}
          TAG: ${{ github.sha }}
