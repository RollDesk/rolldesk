name: Release

# Runs on every published GitHub Release (or when a version tag is pushed).
# Flow: run automated tests, then build and publish versioned release images to GHCR.
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    name: Automated tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund
      - name: Run tests
        working-directory: backend
        run: npm test

  build-release-images:
    name: Build & publish release images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image prefix
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
          else
            RAW_TAG="${{ github.ref_name }}"
          fi
          VERSION="${RAW_TAG#v}"
          PREFIX="${REGISTRY}/$(echo "${IMAGE_PREFIX}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "Building release ${VERSION} -> ${PREFIX}-{backend,frontend}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend release image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}-backend:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.prefix }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend release image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}-frontend:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.prefix }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Release images published"
            echo ""
            echo "- \`${{ steps.meta.outputs.prefix }}-backend:${{ steps.meta.outputs.version }}\`"
            echo "- \`${{ steps.meta.outputs.prefix }}-frontend:${{ steps.meta.outputs.version }}\`"
            echo ""
            echo "Deploy this version on the server by setting \`TAG=${{ steps.meta.outputs.version }}\` in the deployment \`.env\`."
          } >> "$GITHUB_STEP_SUMMARY"
