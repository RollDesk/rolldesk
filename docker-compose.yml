services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rolldesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rolldesk}
      POSTGRES_DB: ${POSTGRES_DB:-rolldesk}
    volumes:
      # PostgreSQL 18+ images store data under /var/lib/postgresql (in a
      # major-version subdirectory), so the volume is mounted there.
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rolldesk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:stable
    # The official ClamAV image is published for amd64 only; pin the platform so
    # it also runs on arm64 hosts (e.g. Apple Silicon) via emulation.
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      # Persist the virus database so freshclam doesn't re-download it on every start.
      - clamav-data:/var/lib/clamav
    healthcheck:
      # clamdcheck.sh (shipped in the image) pings clamd; only healthy once the
      # daemon has loaded the signature database.
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  backend:
    build: ./backend
    image: rolldesk/backend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-rolldesk}:${POSTGRES_PASSWORD:-rolldesk}@db:5432/${POSTGRES_DB:-rolldesk}
      # Secret for signing session tokens. Change this in production!
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      # List of allowed IPs / subnets (CIDR) — comma-separated.
      # Empty = no restriction at the backend layer (nginx filters anyway).
      ALLOWED_IPS: ${ALLOWED_IPS:-}
      TRUST_PROXY: "1"
      # Public base URL of the app — used to link back to RollDesk in
      # notifications and to build the SSO redirect URI (required for SSO).
      APP_BASE_URL: ${APP_BASE_URL:-}
      # Encryption key for stored SSO/OIDC client secrets (AES-256-GCM). If empty,
      # derived from JWT_SECRET; set a dedicated value in production.
      SSO_ENC_KEY: ${SSO_ENC_KEY:-}
      # ClamAV virus scanning for uploaded attachments (separate container).
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      # 'reject' = block uploads if the scanner is unreachable (fail closed);
      # 'allow' = accept unscanned uploads if the scanner is down (fail open).
      CLAMAV_FAIL_MODE: ${CLAMAV_FAIL_MODE:-reject}
      # SMTP — server address comes from configuration, not from code:
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-RollDesk <no-reply@rolldesk.local>}
      # Microsoft Graph / Teams threaded notifications (optional). Secrets come
      # from the environment only and must never be committed. Posting is OFF
      # until GRAPH_ENABLED=1 (see .env.example) — falls back to webhooks.
      GRAPH_ENABLED: ${GRAPH_ENABLED:-0}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      TEAMS_TEAM_ID: ${TEAMS_TEAM_ID:-}
      TEAMS_CHANNEL_ID: ${TEAMS_CHANNEL_ID:-}
    volumes:
      # Dev only: makes local (git-ignored) seed data available inside the container
      # so you can run `docker compose exec backend npm run seed`.
      - ./backend/src/seeds:/app/src/seeds:ro

  frontend:
    build: ./frontend
    image: rolldesk/frontend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # List of allowed IPs / subnets (CIDR) — comma- or space-separated.
      # Example: "203.0.113.4, 198.51.100.0/24, 192.168.0.0/16"
      # Empty = access from any IP (NOT recommended in production).
      ALLOWED_IPS: ${ALLOWED_IPS:-}
    ports:
      # In production usually 80/443 (with a certificate). Here 8080 for convenience.
      - "${HTTP_PORT:-8080}:80"

volumes:
  db-data:
  clamav-data:
